name: Pages

on:
  push:
    branches:
      - main # default branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
          fetch-depth: 0
      # Fix timestamps https://finisky.github.io/githubactiontorestorefilemtime.en/
      - name: Restore Timestamps
        uses: chetan/git-restore-mtime-action@v2.1
      - name: Use Node.js 22.19.0
        uses: actions/setup-node@v6
        with:
          # Examples: 20, 18.19, >=16.20.2, lts/Iron, lts/Hydrogen, *, latest, current, node
          # Ref: https://github.com/actions/setup-node#supported-version-syntax
          node-version: "22.19.0"
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install pandoc (Latex support)
        run: |
          wget -O pandoc.deb https://github.com/jgm/pandoc/releases/download/3.1.3/pandoc-3.1.3-1-amd64.deb
          sudo dpkg -i pandoc.deb
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
