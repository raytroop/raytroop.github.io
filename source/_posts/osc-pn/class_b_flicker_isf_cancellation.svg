<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Why the switching pair's flicker noise does not upconvert</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Four stacked waveforms over one oscillation period: tank voltage, ISF, pair transconductance pulses at the two zero crossings, and their product. The product has one positive and one negative pulse of equal area, so its average is zero and slow noise causes no net phase shift.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><mask id="imagine-text-gaps-ua0liw" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="620" fill="white"/><rect x="66" y="27" width="194.4580078125" height="20" fill="black" rx="2"/><rect x="236" y="75" width="161.734375" height="18" fill="black" rx="2"/><rect x="66" y="157" width="335.6875" height="20" fill="black" rx="2"/><rect x="214" y="183" width="44.296875" height="18" fill="black" rx="2"/><rect x="484" y="277" width="44.296875" height="18" fill="black" rx="2"/><rect x="66" y="307" width="406.5224609375" height="20" fill="black" rx="2"/><rect x="516" y="337" width="93.69140625" height="18" fill="black" rx="2"/><rect x="66" y="413" width="212.328125" height="20" fill="black" rx="2"/><rect x="239" y="447" width="23.015625" height="18" fill="black" rx="2"/><rect x="509" y="529" width="23.015625" height="18" fill="black" rx="2"/><rect x="73.21875" y="582" width="534.5564575195312" height="18" fill="black" rx="2"/></mask></defs>

