<svg width="100%" viewBox="0 0 680 385" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Shield grounded at both ends forms a closed loop</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A noise wire carries current to the right above a shield tube. The shield and the common ground form a closed loop threaded by magnetic flux from the noise current, so Faraday's law induces an opposite current in the shield.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><mask id="imagine-text-gaps-ajpfxs" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="680" height="385" fill="white"/><rect x="514" y="64.5" width="93.53125" height="19" fill="black" rx="2"/><rect x="208.09375" y="274.5" width="143.8125" height="19" fill="black" rx="2"/><rect x="514" y="146.5" width="99.840576171875" height="19" fill="black" rx="2"/><rect x="514" y="120.5" width="108.546875" height="19" fill="black" rx="2"/><rect x="230.203125" y="322.5" width="99.59375" height="19" fill="black" rx="2"/><rect x="514" y="230.5" width="121.90625" height="34.600006103515625" fill="black" rx="2"/><rect x="125.5625" y="354.5" width="428.875" height="19" fill="black" rx="2"/></mask></defs>

